<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Método 5 Marchas | Acelere Suas Vendas de Veículos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              serif: ['"Montserrat"', 'sans-serif'], // Let's map serif to Montserrat for high-end bold headlines
              sans: ['"Inter"', 'sans-serif'],
              display: ['"Montserrat"', 'sans-serif'],
            },
            colors: {
              brand: {
                blue: '#0052FF', // Electric High-Performance Blue
                blueHover: '#0040D0',
                blueGlow: 'rgba(0, 82, 255, 0.4)',
                red: '#0052FF', // Aliasing to blue for backward compatibility
                redHover: '#0040D0',
                redGlow: 'rgba(0, 82, 255, 0.4)',
                black: '#0A0A0C', // Absolute deep car-carbon black
                charcoal: '#141416', // Sleek dashboard charcoal
                gray: '#1E1E22', // Light carbon gray
                light: '#F5F5F7', // Premium white/light gray
                muted: '#8A8A93' // Muted text gray
              }
            }
          }
        }
      }
    </script>
    <style>
      html {
        scroll-behavior: smooth;
        scroll-padding-top: 80px;
      }
      body {
        background-color: #0A0A0C;
        color: #F5F5F7;
      }
      /* Custom glowing animations */
      @keyframes pulse-glow {
        0%, 100% {
          box-shadow: 0 0 15px rgba(0, 82, 255, 0.4);
        }
        50% {
          box-shadow: 0 0 30px rgba(0, 82, 255, 0.8);
        }
      }
      .blue-glow-btn {
        animation: pulse-glow 2s infinite ease-in-out;
      }
      .red-glow-btn {
        animation: pulse-glow 2s infinite ease-in-out; /* Aliasing for compatibility */
      }
      /* Hide scrollbar but keep functionality if desired, or styled scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #0A0A0C;
      }
      ::-webkit-scrollbar-thumb {
        background: #242426;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #0052FF;
      }
      @media print {
        nav, footer, button {
          display: none !important;
        }
      }
    </style>
